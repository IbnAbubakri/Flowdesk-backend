# FlowDesk AI Backend — Render Blueprint
# WhatsApp bridge runs locally (connect with your phone)
services:
  - type: web
    name: flowdesk-backend
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn flowdesk_api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false  # Set in Render dashboard
